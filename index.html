<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>BMI</title>
    </head>
    <body>

        <div align = "center">


            <h1 id = "title">BMI Calculator</h1>


            <h2>Height Unit</h2>
            <input list="heightOptions" placeholder="Type" id = "height">
            <select id="heightOptions">
                <option value="cm">cm</option>
                <option value="meter">meter</option>
                <option value="feet">feet</option>

            </select>

            <br><br>

            <h2>Weight Unit</h2>
            <input list="weightOptions" placeholder="Type" id = "weight">
            <select id="weightOptions">
                <option value="kg">kg</option>
                <option value="pounds">pounds</option>

            </select>

            <br>
            <br>

            <button id="submitBtn">SUBMIT</button><br>

            <div id="displayBMI">
                
            </div>

        
        </div>


    </body>
    <script src = "script.js"></script>
</html>
